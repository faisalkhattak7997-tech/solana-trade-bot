name: SolSniper Auto Trading Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          pip install --upgrade pip
          pip install requests solders==0.21.0 solana==0.35.0 || pip install requests

      - name: Ensure signals.json exists
        run: |
          [ -f signals.json ] || echo '{"signals":[],"trades":[],"stats":{"scans":0,"signals":0,"trades":0},"wallet":{"address":"","balance":0},"last_scan":"never"}' > signals.json

      - name: Run Bot
        env:
          SOLANKEY: ${{ secrets.SOLANKEY }}
          AUTOTRADE: ${{ secrets.AUTOTRADE }}
          TRADEAMOUNT: ${{ secrets.TRADEAMOUNT }}
          WALLETADDRESS: ${{ secrets.WALLETADDRESS }}
          RPCURL: ${{ secrets.RPCURL }}
        run: python bot.py

      - name: Push signals.json
        run: |
          git config --global user.name "SolSniper"
          git config --global user.email "bot@solsniper.io"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add -f signals.json
          git diff --staged --quiet && echo "no changes" || git commit -m "bot: $(date -u '+%H:%M %d-%b')"
          git push origin HEAD:main || true
